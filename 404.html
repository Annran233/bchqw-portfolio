<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#111111">
    <link rel="preconnect" href="https://google-fonts.mirrors.sjtug.sjtu.edu.cn" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://google-fonts.mirrors.sjtug.sjtu.edu.cn/css2?family=Inter:wght@400;900&family=Noto+Sans+SC:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/404.css">
</head>
<body id="pageBody">

    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="page-container">

        <header class="top-bar">
            <div class="logo" onclick="window.location.href = '/'">
                <span>北川哈气物</span>
            </div>
            <div class="menu-btn" onclick="toggleSidebar()">MENU ▾</div>
        </header>

        <main class="error-content">
            <div class="marquee-wrapper">
                <div class="marquee-track">
                    <span class="marquee-item">404 NOT FOUND</span>
                    <span class="marquee-item">404 未找到页面</span>
                    <span class="marquee-item">404 NOT FOUND</span>
                    <span class="marquee-item">404 未找到页面</span>
                    <span class="marquee-item">404 NOT FOUND</span>
                    <span class="marquee-item">404 未找到页面</span>
                    <span class="marquee-item">404 NOT FOUND</span>
                    <span class="marquee-item">404 未找到页面</span>
                    <span class="marquee-item">404 NOT FOUND</span>
                    <span class="marquee-item">404 未找到页面</span>
                </div>
            </div>

            <div class="error-message">
                <p>您访问的页面不存在，或者被移动到了其他位置。</p>
                <p>The page you visited has been moved to a new location or has been deleted.</p>
                <a href="/" class="back-home-btn">← 返回主页</a>
            </div>
        </main>

        {{> footer}}
    </div>

    {{> cookie-banner}}
    {{> sidebar}}

    <script defer src="/js/404.js"></script>
</body>
</html>
